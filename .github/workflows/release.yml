name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: 386
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: 386
            ext: ".exe"
          - os: windows
            arch: arm64
            ext: ".exe"
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.5"

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Download dependencies
        run: go mod download

      - name: Tidy modules
        run: go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist

          BIN_NAME="dan-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN_NAME}" ./cmd/dan/main.go

      - name: Package release
        shell: bash
        run: |
          cd dist

          if [[ "${{ matrix.os }}" == "windows" ]]; then
            zip "${BIN_NAME}.zip" "${BIN_NAME}"
            echo "dist/${BIN_NAME}.zip" >> ../files.txt
          else
            tar -czf "${BIN_NAME}.tar.gz" "${BIN_NAME}"
            echo "dist/${BIN_NAME}.tar.gz" >> ../files.txt
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}